name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Jalankan deployment otomatis saat push ke branch main

# Mengatur izin token GitHub untuk deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Menghindari antrian deployment ganda
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Aplikasi
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload hasil build (Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
